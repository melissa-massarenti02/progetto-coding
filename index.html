import os

# Definiamo il contenuto HTML, CSS e JS in un unico blocco
html_content = """
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaggio Finale - In Viaggio con il Codice</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Dancing+Script:wght@700&display=swap');

        body {
            background-color: #0b1a30;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Special Elite', typewriter;
        }

        .scroll-wrapper {
            position: relative;
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scroll-container {
            position: relative;
            width: 100%;
            height: 0;
            background: #f4e4bc;
            background-image: url("https://www.transparenttextures.com/patterns/old-map.png");
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            border-left: 15px solid #d4a373;
            border-right: 15px solid #d4a373;
            transition: height 2.5s cubic-bezier(0.42, 0, 0.58, 1);
            overflow-y: auto;
            z-index: 1;
        }

        .scroll-container.unrolled {
            height: 80vh;
            padding: 40px 0;
        }

        .roller {
            width: 105%;
            height: 40px;
            background: #8b5a2b;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .character {
            position: absolute;
            width: 120px;
            z-index: 3;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        #char-top-right { top: 20px; right: 20px; width: 150px; }
        #char-bottom-left { bottom: 20px; left: 20px; width: 140px; }

        .unrolled .character { opacity: 1; }

        #message-content {
            padding: 20px 60px;
            font-size: 1.4rem;
            line-height: 1.8;
            color: #3d2b1f;
            text-align: center;
        }

        #final-button {
            display: none;
            margin: 30px auto;
            padding: 18px 45px;
            font-size: 1.8rem;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Dancing Script', cursive;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        #final-button:hover { 
            transform: scale(1.1); 
            background-color: #d35400;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <audio id="bg-music" src="universfield-new-level-04-152480.mp3" preload="auto"></audio>

    <div class="scroll-wrapper">
        <div class="roller"></div>
        
        <div class="scroll-container" id="pergamena">
            <div id="message-content">
                <div id="text-target"></div>
                <button id="final-button" onclick="celebrate()">🎓 Apri il Baule del Tesoro!</button>
            </div>
        </div>

        <div class="roller"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    const text = `Ce l’avete fatta… il nostro robottino è arrivato a Codificopoli sano e salvo! 🚀🤖

E sapete perché? Perché voi siete stati dei programmatori bravissimi! 🌟

Avete imparato a pensare passo dopo passo…
A comunicare senza parole…
A creare con fantasia e precisione…
E, soprattutto, a lavorare insieme! 🤝

Per questo oggi… voglio darvi un premio molto speciale.
È il vostro ATTESTATO DI PICCOLO PROGRAMMATORE! 🎓

Un riconoscimento per tutto l’impegno, la curiosità e la magia che avete messo in questo viaggio. ✨

Ricordate: un programmatore non è solo chi sa usare un computer…
È chi immagina, costruisce, prova, sbaglia e riprova…
È chi crea nuove strade per arrivare lontano! 🛤️

Da oggi, il mondo del coding ha nuovi esploratori… e siete voi! 🌍💻🤖

Complimenti, piccoli programmatori… il viaggio è appena cominciato!`;

    const target = document.getElementById('text-target');
    const pergamena = document.getElementById('pergamena');
    const btn = document.getElementById('final-button');
    const music = document.getElementById('bg-music');
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            target.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 45);
            pergamena.scrollTop = pergamena.scrollHeight;
        } else {
            btn.style.display = 'block';
        }
    }

    window.onload = () => {
        setTimeout(() => {
            pergamena.classList.add('unrolled');
        }, 800);

        pergamena.addEventListener('transitionend', (e) => {
            if(e.propertyName === 'height' && i === 0) typeWriter();
        });
    };

    function celebrate() {
        // L'AUDIO PARTE SOLO QUI
        music.currentTime = 0; 
        music.play();
        
        // Effetto coriandoli
        confetti({
            particleCount: 200,
            spread: 90,
            origin: { y: 0.6 },
            colors: ['#e67e22', '#f1c40f', '#3498db', '#2ecc71', '#ffffff']
        });
    }
</script>

</body>
</html>
"""

# Scrittura del file
with open("lettera_finale_coding.html", "w", encoding="utf-8") as f:
    f.write(html_content)
